<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Arenası - Şehir Savaşı</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f0f1a; color: #fff; text-align: center; overflow: hidden; }
        
        #ui-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 35, 0.9); padding: 12px 25px; border-radius: 10px;
            display: flex; gap: 25px; z-index: 10; font-weight: bold; border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #gameCanvas { background: #181824; display: block; cursor: crosshair; }

        .starter-modal {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 10, 20, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
        }

        .starter-modal h1 { font-size: 2.5rem; margin-bottom: 10px; color: #ff9800; }
        .starter-modal p { color: #aaa; margin-bottom: 25px; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .card { 
            background: #1f1f33; border: 2px solid #3d3d66; padding: 25px; border-radius: 12px; 
            cursor: pointer; width: 200px; transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover { border-color: #ff9800; transform: translateY(-5px); background: #2a2a45; }
        .card h3 { margin-bottom: 8px; }

        .controls-hint {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 20px; font-size: 0.85rem; color: #ccc;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div id="ui-bar">
        <div>💰 Altın: <span id="goldText" style="color:#ffd700">100</span></div>
        <div>🏆 Skor: <span id="scoreText" style="color:#00ffcc">0</span></div>
        <div>⚡ Element: <span id="elementText" style="color:#ff9800">-</span></div>
    </div>

    <div id="starterModal" class="starter-modal">
        <h1>🌐 ELEMENT ARENASI</h1>
        <p>Başlangıç elementini seç ve online botlarla dolu şehre gir!</p>
        <div class="grid">
            <div class="card" onclick="selectElement('Ateş')">
                <h3>🔥 Ateş</h3>
                <span style="font-size:0.8rem; color:#aaa;">Yüksek Hasar</span>
            </div>
            <div class="card" onclick="selectElement('Su')">
                <h3>💧 Su</h3>
                <span style="font-size:0.8rem; color:#aaa;">Can Yenileme</span>
            </div>
            <div class="card" onclick="selectElement('Hava')">
                <h3>🌪️ Hava</h3>
                <span style="font-size:0.8rem; color:#aaa;">Hızlı Saldırı</span>
            </div>
            <div class="card" onclick="selectElement('Toprak')">
                <h3>🪨 Toprak</h3>
                <span style="font-size:0.8rem; color:#aaa;">Yüksek Savunma</span>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls-hint">
        <b>Hareket:</b> WASD / Yön Tuşları | <b>Ateş Et:</b> Sol Tık
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gold = 100;
        let score = 0;
        let selectedElement = "";
        let gameRunning = false;

        const MAP_SIZE = 2400;
        const camera = { x: 0, y: 0 };

        const player = {
            x: MAP_SIZE / 2,
            y: MAP_SIZE / 2,
            radius: 16,
            color: "#00ffcc",
            speed: 4.5,
            hp: 100,
            maxHp: 100
        };

        const keys = {};
        const mouse = { x: 0, y: 0 };
        const buildings = [];
        const npcs = [];
        const bullets = [];

        const botNames = ["Alpha_Bot", "Vortex", "Shadow", "Elementor", "Cyber_Kral", "X_Player", "Nova"];

        function generateCity() {
            for (let x = 150; x < MAP_SIZE - 250; x += 350) {
                for (let y = 150; y < MAP_SIZE - 250; y += 350) {
                    buildings.push({ x: x, y: y, w: 200, h: 200 });
                }
            }
        }

        function spawnNPCs(count) {
            for (let i = 0; i < count; i++) {
                npcs.push({
                    name: botNames[Math.floor(Math.random() * botNames.length)] + "_" + Math.floor(Math.random()*89 + 10),
                    x: Math.random() * (MAP_SIZE - 300) + 150,
                    y: Math.random() * (MAP_SIZE - 300) + 150,
                    radius: 16,
                    color: `hsl(${Math.random() * 360}, 75%, 55%)`,
                    hp: 100,
                    maxHp: 100,
                    vx: (Math.random() - 0.5) * 2.5,
                    vy: (Math.random() - 0.5) * 2.5
                });
            }
        }

        window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
        window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener("click", shootBullet);

        function selectElement(elem) {
            selectedElement = elem;
            document.getElementById("elementText").innerText = elem;
            document.getElementById("starterModal").style.display = "none";
            
            generateCity();
            spawnNPCs(25);
            gameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        function shootBullet() {
            if (!gameRunning) return;
            const worldMouseX = mouse.x + camera.x;
            const worldMouseY = mouse.y + camera.y;

            const angle = Math.atan2(worldMouseY - player.y, worldMouseX - player.x);
            bullets.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(angle) * 12,
                vy: Math.sin(angle) * 12,
                radius: 5,
                color: "#ffeb3b"
            });
        }

        function drawHealthBar(x, y, hp, maxHp, width = 45) {
            const barHeight = 6;
            const barX = x - width / 2;
            const barY = y - 28;

            ctx.fillStyle = "#ff3333";
            ctx.fillRect(barX, barY, width, barHeight);

            ctx.fillStyle = "#00ff66";
            ctx.fillRect(barX, barY, (hp / maxHp) * width, barHeight);

            ctx.strokeStyle = "#000";
            ctx.lineWidth = 1;
            ctx.strokeRect(barX, barY, width, barHeight);
        }

        function update() {
            if (keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            player.x = Math.max(player.radius, Math.min(MAP_SIZE - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(MAP_SIZE - player.radius, player.y));

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                for (let j = npcs.length - 1; j >= 0; j--) {
                    let npc = npcs[j];
                    let dist = Math.hypot(b.x - npc.x, b.y - npc.y);

                    if (dist < b.radius + npc.radius) {
                        npc.hp -= 35;
                        bullets.splice(i, 1);

                        if (npc.hp <= 0) {
                            npcs.splice(j, 1);
                            gold += 40;
                            score += 150;
                            document.getElementById("goldText").innerText = gold;
                            document.getElementById("scoreText").innerText = score;
                            spawnNPCs(1);
                        }
                        break;
                    }
                }
            }

            npcs.forEach(npc => {
                npc.x += npc.vx;
                npc.y += npc.vy;

                if (npc.x < 50 || npc.x > MAP_SIZE - 50) npc.vx *= -1;
                if (npc.y < 50 || npc.y > MAP_SIZE - 50) npc.vy *= -1;
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Yollar
            ctx.strokeStyle = "#28283d";
            ctx.lineWidth = 2;
            for (let x = 0; x < MAP_SIZE; x += 100) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, MAP_SIZE); ctx.stroke();
            }
            for (let y = 0; y < MAP_SIZE; y += 100) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(MAP_SIZE, 0); ctx.stroke();
            }

            // Binalar
            ctx.fillStyle = "#12121f";
            ctx.strokeStyle = "#ff9800";
            ctx.lineWidth = 2;
            buildings.forEach(b => {
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeRect(b.x, b.y, b.w, b.h);
            });

            // Mermiler
            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Botlar
            npcs.forEach(npc => {
                ctx.fillStyle = npc.color;
                ctx.beginPath();
                ctx.arc(npc.x, npc.y, npc.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#fff";
                ctx.font = "11px sans-serif";
                ctx.fillText(npc.name, npc.x - 20, npc.y + 30);

                drawHealthBar(npc.x, npc.y, npc.hp, npc.maxHp);
            });

            // Oyuncu
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
            drawHealthBar(player.x, player.y, player.hp, player.maxHp, 55);

            ctx.restore();
        }

        function gameLoop() {
            if (gameRunning) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
